<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <title>Análise dos registro de gravação Novo Tempo</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
      }
      .magnifying-glass {
        animation: scan 4s ease-in-out infinite;
      }
      .status-text {
        animation: text-fade 2.5s ease-in-out infinite;
      }
      .animate-cell-pop span {
        animation: cell-pop 4s ease-in-out infinite;
      }

      @keyframes scan {
        0%, 100% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(120px, 60px) rotate(20deg);
        }
        50% {
          transform: translate(120px, 0) rotate(0deg);
        }
        75% {
          transform: translate(0, 60px) rotate(-20deg);
        }
      }

      @keyframes cell-pop {
        0%, 20%, 100% {
          opacity: 0;
          transform: scale(0.5);
        }
        30%, 50% {
          opacity: 1;
          transform: scale(1);
        }
        60%, 90% {
          opacity: 0;
          transform: scale(0.5);
        }
      }

       @keyframes text-fade {
        0%, 100% {
            opacity: 0.5;
            transform: translateY(5px);
        }
        10%, 90% {
            opacity: 1;
            transform: translateY(0);
        }
       }
    </style>
